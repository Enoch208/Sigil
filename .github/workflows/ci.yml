name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the self-audit can resolve every LOOP.md commit SHA.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      # The auditor must hold itself to its own standard: fail the build if our
      # own Loop Integrity Score drops below 95 or any LOOP.md line is contradicted.
      - run: npm run self-audit
